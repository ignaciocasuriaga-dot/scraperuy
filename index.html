<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RGM - Lectura de Precios</title>

<style>
body { font-family:'Segoe UI'; margin:0; background:#f5f6fa; }

.header {
    background:#2c4a7a;
    color:white;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header h1 { margin:0; }

.btn-header {
    background:red;
    color:white;
    padding:12px 20px;
    border:none;
    cursor:pointer;
}

.menu {
    background:#1e3c72;
    padding:10px;
    display:flex;
    gap:10px;
}

.menu button {
    padding:10px;
    background:#2a5298;
    color:white;
    border:none;
    cursor:pointer;
}

.menu button.active { background:red; }

.container { max-width:1200px; margin:auto; padding:20px; }

.seccion { display:none; }
.seccion.active { display:block; }

.table-container {
    background:white;
    padding:20px;
    border-radius:8px;
    margin-top:20px;
}

table { width:100%; border-collapse:collapse; }

th, td {
    padding:10px;
    border-bottom:1px solid #ddd;
}

th { background:#eee; }

.badge-super {
    padding:5px 8px;
    border-radius:5px;
    color:white;
}

.tata {background:orange;}
.disco {background:blue;}
</style>
</head>

<body>

<div class="header">
    <h1>RGM - Lectura de Precios</h1>
    <button class="btn-header" onclick="actualizar()">Actualizar</button>
</div>

<div class="menu">
    <button class="active" onclick="cambiarSeccion('lectura', this)">Lectura</button>
    <button onclick="cambiarSeccion('cobertura', this)">Cobertura</button>
    <button onclick="cambiarSeccion('listas', this)">Carga de listas</button>
</div>

<div class="container">

<div id="lectura" class="seccion active">
    <div class="table-container">
        <table id="tablaPrecios">
            <thead>
            <tr>
                <th>Marca</th>
                <th>Descripción</th>
                <th>Super</th>
                <th>Precio</th>
            </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<div id="cobertura" class="seccion">
    <div class="table-container">
        <div id="coberturaResumen"></div>
        <table id="tablaCobertura">
            <thead>
            <tr>
                <th>Marca</th>
                <th>Más barato</th>
                <th>Más caro</th>
            </tr>
            </thead>
