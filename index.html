<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RGM - Lectura de Precios</title>

<style>
body {
    font-family: 'Segoe UI';
    background:#f5f6fa;
    margin:0;
    padding:20px;
}
.container { max-width:1200px; margin:auto; }

.header {
    background:#1e3c72;
    color:white;
    padding:20px;
    border-radius:8px;
    display:flex;
    justify-content:space-between;
}

button {
    padding:10px 20px;
    background:red;
    color:white;
    border:none;
    cursor:pointer;
}

.table-container {
    background:white;
    padding:20px;
    margin-top:20px;
    border-radius:8px;
}

table {
    width:100%;
    border-collapse:collapse;
}

th, td {
    padding:10px;
    border-bottom:1px solid #ddd;
}

th { background:#eee; }

.badge-super {
    padding:4px 8px;
    border-radius:5px;
    color:white;
}

.tata { background:orange; }
.disco { background:blue; }
.tienda { background:green; }
.dorado { background:brown; }

</style>
</head>

<body>

<div class="container">

<div class="header">
    <h2>RGM - Lectura de Precios</h2>
    <button id="btnActualizar">Actualizar</button>
</div>

<div class="table-container">
<h3>Precios</h3>
<table id="tablaPrecios">
<thead>
<tr>
<th>Marca</th>
<th>Descripción</th>
<th>Super</th>
<th>Precio</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<div class="table-container">
<h3>📊 Cobertura</h3>

<div id="coberturaResumen"></div>

<table id="tablaCobertura">
<thead>
<tr>
<th>Marca</th>
<th>Más barato</th>
<th>Más caro</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

</div>

<script>

// ✅ TU BASE ORIGINAL (NO TOCAR)
const baseDeDatosScraper = [
    { marca: "BIMBO", descripcion: "Pan Lactal Blanco Bimbo", super: "TaTa", clase: "tata", precio: 165, oferta: 145 },
    { marca: "BIMBO", descripcion: "Pan Bimbo", super: "Disco", clase: "disco", precio: 170 },
    { marca: "TAKIS", descripcion: "Takis Fuego", super: "Disco", clase: "disco", precio: 200 },
    { marca: "TAKIS", descripcion: "Takis Fuego", super: "TaTa", clase: "tata", precio: 190 },
    { marca: "SALMAS", descripcion: "Salmas", super: "Tienda Inglesa", clase: "tienda", precio: 150 },
    { marca: "SALMAS", descripcion: "Salmas", super: "Disco", clase: "disco", precio: 140 },
    { marca: "TIA ROSA", descripcion: "Tortillas", super: "El Dorado", clase: "dorado", precio: 180 },
    { marca: "TIA ROSA", descripcion: "Tortillas", super: "TaTa", clase: "tata", precio: 170 }
];

// ✅ TABLA (igual que la tuya)
function procesarYMostrarPrecios() {
    const tbody = document.querySelector("#tablaPrecios tbody");
    tbody.innerHTML = "";

    baseDeDatosScraper.forEach(prod => {

        const precioFinal = prod.oferta || prod.precio;

        const fila = document.createElement("tr");

        fila.innerHTML = `
            <td><b>${prod.marca}</b></td>
            <td>${prod.descripcion}</td>
            <td><span class="badge-super ${prod.clase}">${prod.super}</span></td>
            <td>$${precioFinal}</td>
        `;

        tbody.appendChild(fila);
    });
}

// ✅ NUEVA FUNCIÓN COBERTURA (NO ROMPE NADA)
function generarCobertura() {

    const conteo = {};
    const resumen = {};
    const porMarca = {};

    baseDeDatosScraper.forEach(prod => {

        const precio = prod.oferta || prod.precio;

        // conteo
        conteo[prod.super] = (conteo[prod.super] || 0) + 1;

        // promedio
        if (!resumen[prod.super]) {
            resumen[prod.super] = { total: 0, cant: 0 };
        }
        resumen[prod.super].total += precio;
        resumen[prod.super].cant++;

        // por marca
        if (!porMarca[prod.marca]) porMarca[prod.marca] = [];
        porMarca[prod.marca].push({ super: prod.super, precio });
    });

    // más caro / barato
    let caro = "", barato = "";
    let max = 0, min = 999999;

    Object.keys(resumen).forEach(s => {
        let prom = resumen[s].total / resumen[s].cant;

        if (prom > max) { max = prom; caro = s; }
        if (prom < min) { min = prom; barato = s; }
    });

    // resumen HTML
    let html = "<h4>Productos por supermercado</h4>";
    Object.keys(conteo).forEach(s => {
        html += `<p>${s}: ${conteo[s]}</p>`;
    });

    html += `
        <h4>General</h4>
        <p>Más caro: ${caro}</p>
        <p>Más barato: ${barato}</p>
    `;

    document.getElementById("coberturaResumen").innerHTML = html;

    // tabla marcas
    const tbody = document.querySelector("#tablaCobertura tbody");
    tbody.innerHTML = "";

    Object.keys(porMarca).forEach(m => {

        let min = 999999, max = 0;
        let supMin = "", supMax = "";

        porMarca[m].forEach(x => {
            if (x.precio < min) { min = x.precio; supMin = x.super; }
            if (x.precio > max) { max = x.precio; supMax = x.super; }
        });

        const fila = document.createElement("tr");

        fila.innerHTML = `
            <td>${m}</td>
            <td>${supMin} ($${min})</td>
            <td>${supMax} ($${max})</td>
        `;

        tbody.appendChild(fila);
    });
}

// ✅ BOTÓN (CLAVE)
document.getElementById("btnActualizar").addEventListener("click", () => {
    procesarYMostrarPrecios();
    generarCobertura();
});

// ✅ AUTOLOAD
window.onload = () => {
    procesarYMostrarPrecios();
    generarCobertura();
};

</script>

</body>
</html>
