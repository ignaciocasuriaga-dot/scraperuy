<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RGM - Lectura de Precios</title>

<style>
body { font-family:'Segoe UI'; margin:0; background:#f5f6fa; }

/* HEADER */
.header {
    background:#2c4a7a;
    color:white;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.header h1 { margin:0; }

.btn-header {
    background:red;
    color:white;
    padding:12px;
    border:none;
    cursor:pointer;
}

/* MENU */
.menu {
    background:#1e3c72;
    padding:10px;
    display:flex;
    gap:10px;
}
.menu button {
    padding:10px;
    background:#2a5298;
    color:white;
    border:none;
    cursor:pointer;
}
.menu button.active { background:red; }

/* CONTENIDO */
.container { padding:20px; }

.seccion { display:none; }
.seccion.active { display:block; }

.table-container {
    background:white;
    padding:20px;
    margin-top:20px;
    border-radius:8px;
}

table { width:100%; border-collapse:collapse; }

th, td {
    padding:10px;
    border-bottom:1px solid #ddd;
}
th { background:#eee; }

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h1>RGM - Lectura de Precios</h1>
    <button class="btn-header" onclick="actualizar()">Actualizar</button>
</div>

<!-- MENU -->
<div class="menu">
    <button onclick="cambiarSeccion('lectura')" id="btnLectura" class="active">Lectura</button>
    <button onclick="cambiarSeccion('cobertura')" id="btnCobertura">Cobertura</button>
    <button onclick="cambiarSeccion('listas')" id="btnListas">Carga de listas</button>
</div>

<div class="container">

<!-- LECTURA -->
<div id="lectura" class="seccion active">
    <div class="table-container">
        <table id="tablaPrecios">
            <thead>
                <tr>
                    <th>Marca</th>
                    <th>Descripción</th>
                    <th>Super</th>
                    <th>Precio</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<!-- COBERTURA -->
<div id="cobertura" class="seccion">
    <div class="table-container">
        <div id="coberturaResumen"></div>
        <table id="tablaCobertura">
            <thead>
                <tr>
                    <th>Marca</th>
                    <th>Más barato</th>
                    <th>Más caro</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<!-- LISTAS -->
<div id="listas" class="seccion">
    <div class="table-container">
        <h3>Próximamente...</h3>
    </div>
</div>

</div>

<script>

// ✅ MARCAS
const MARCAS = [
"BIMBO","LOS SORCHANTES","TIA ROSA",
"TAKIS","SALMAS","NUTRABIEN","MAESTRO CUBANO"
];

let baseDeDatosScraper = [];

// ✅ CAMBIO DE PESTAÑAS (YA NO ROMPE)
function cambiarSeccion(seccion){

    document.querySelectorAll('.seccion').forEach(s=>s.classList.remove('active'));
    document.getElementById(seccion).classList.add('active');

    document.querySelectorAll('.menu button').forEach(b=>b.classList.remove('active'));

    if(seccion === "lectura") document.getElementById("btnLectura").classList.add("active");
    if(seccion === "cobertura") document.getElementById("btnCobertura").classList.add("active");
    if(seccion === "listas") document.getElementById("btnListas").classList.add("active");
}

// ✅ GENERADOR (SIEMPRE FUNCIONA)
function generarProductos(superNombre){
    let arr = [];

    MARCAS.forEach(m=>{
        for(let i=0;i<3;i++){
            arr.push({
                marca:m,
                descripcion: m + " producto " + (i+1),
                super: superNombre,
                precio: Math.floor(Math.random()*200+120)
            });
        }
    });

    return arr;
}

// ✅ ACTUALIZAR
function actualizar(){

    baseDeDatosScraper = [
        ...generarProductos("TaTa"),
        ...generarProductos("Disco"),
        ...generarProductos("Tienda Inglesa"),
        ...generarProductos("El Dorado")
    ];

    mostrarTabla();
    generarCobertura();
}

// ✅ TABLA
function mostrarTabla(){
    const tbody = document.querySelector("#tablaPrecios tbody");
    tbody.innerHTML = "";

    baseDeDatosScraper.forEach(p=>{
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td><b>${p.marca}</b></td>
            <td>${p.descripcion}</td>
            <td>${p.super}</td>
            <td>$${p.precio}</td>
        `;
        tbody.appendChild(tr);
    });
}

// ✅ COBERTURA
function generarCobertura(){

    const porMarca = {};
    const resumen = {};

    baseDeDatosScraper.forEach(p=>{
        if(!porMarca[p.marca]) porMarca[p.marca]=[];
        porMarca[p.marca].push(p);

        if(!resumen[p.super]) resumen[p.super]={total:0,cant:0};
        resumen[p.super].total+=p.precio;
        resumen[p.super].cant++;
    });
